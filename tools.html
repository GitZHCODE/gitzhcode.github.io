---
layout: default
title: Tools
permalink: /tools/
---

<section class="page-section">
  <p class="eyebrow">Tools</p>

  <div class="tool-grid" aria-label="Tools list">
    {% assign tools = site.tools | sort: "order" %}
    {% for tool in tools %}
      <a class="tool-card" href="{{ tool.url | relative_url }}">
        <img src="{{ tool.image | relative_url }}" alt="">
        <span>{{ tool.title }}</span>
        <p>{{ tool.description }}</p>
      </a>
    {% endfor %}
  </div>
</section>
