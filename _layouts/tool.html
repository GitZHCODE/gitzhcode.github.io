---
layout: default
---

<article class="tool-article publication-article">
  <a class="back-link" href="{{ '/tools/' | relative_url }}">Back to tools</a>

  <header class="tool-hero publication-hero">
    <img src="{{ page.image | relative_url }}" alt="">
    <p class="eyebrow">Tool</p>
    <h2>{{ page.title }}</h2>
    <p class="tool-description">{{ page.description }}</p>
  </header>

  <section class="tool-details publication-details">
    {{ content }}
  </section>
</article>
