---
layout: default
---

<article class="tool-article">
  <a class="back-link" href="{{ '/tools/' | relative_url }}">Back to tools</a>
  <header class="article-hero">
    <img src="{{ page.image | relative_url }}" alt="">
    <div>
      <p class="eyebrow">Tool</p>
      <h1>{{ page.title }}</h1>
      <p>{{ page.description }}</p>
    </div>
  </header>

  <div class="article-body">
    {{ content }}
  </div>
</article>
